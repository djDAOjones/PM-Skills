name: Lint

# Enforces the framework's own Markdown standard and internal-link
# integrity on every push to the default branch and every pull request.
# Runs in a clean Ubuntu runner, so the OneDrive / on-demand filesystem
# constraints of a local checkout never apply here.

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  markdown:
    name: Markdown lint and link check
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Markdown lint (markdownlint-cli2)
        run: npm run lint:md

      - name: Internal link check
        run: npm run lint:links
