name: Lint

# Runs the framework's full quality gate -- Markdown standard, internal
# link integrity, inline path references, spelling, and EditorConfig
# conformance -- on every push to the default branch and every pull
# request. Runs in a clean Ubuntu runner, so the OneDrive / on-demand
# filesystem constraints of a local checkout never apply here.

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same ref: rapid pushes (or PR updates)
# should not queue redundant lint runs — only the latest commit matters.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdown:
    name: Lint, links, paths, spelling and EditorConfig
    runs-on: ubuntu-latest
    # Lint + link check finish in seconds; cap the job so a hung runner
    # fails fast instead of consuming the default 6-hour budget.
    timeout-minutes: 10
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Markdown lint (markdownlint-cli2)
        run: npm run lint:md

      - name: Docs integrity (links + inline paths)
        run: npm run lint:docs

      - name: Spell check (cspell)
        run: npm run lint:spell

      - name: EditorConfig check
        run: npm run lint:editorconfig

      - name: Distribution boundary (pm_skills tree vs MANIFEST)
        run: npm run lint:boundary
